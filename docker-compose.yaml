# Docker Compose for local Dagster development
# Mirrors the qa-platform orchestrator dev setup.
#
# Usage:
#   docker compose build
#   docker compose up
#
# Access:
#   Dagster Web UI: http://localhost:3000

# ---------------------------------------------------------------------------
# Shared environment blocks (YAML anchors)
# ---------------------------------------------------------------------------

x-proxy-env: &proxy-env
  HTTP_PROXY: http://proxy-dmz.intel.com:912/
  HTTPS_PROXY: http://proxy-dmz.intel.com:912/
  NO_PROXY: 0.0.0.0,127.0.0.1,localhost,intel.com,habana-labs.com,dagster-db,dagster,user-deployment,host.docker.internal
  no_proxy: 0.0.0.0,127.0.0.1,localhost,intel.com,habana-labs.com,dagster-db,dagster,user-deployment,host.docker.internal

x-dagster-db-env: &dagster-db-env
  DAGSTER_PG_USERNAME: dagster
  DAGSTER_PG_PASSWORD: dagster
  DAGSTER_PG_HOST: dagster-db
  DAGSTER_PG_DB: dagster

x-stary-config-env: &stary-config-env
  INFERENCE_URL: ${INFERENCE_URL:-http://host.docker.internal:3030/v1/chat/completions}
  AGENT1_INFERENCE_URL: ${AGENT1_INFERENCE_URL:-}
  AGENT2_INFERENCE_URL: ${AGENT2_INFERENCE_URL:-}
  AGENT3_INFERENCE_URL: ${AGENT3_INFERENCE_URL:-}
  JIRA_BASE_URL: ${JIRA_BASE_URL:-}
  JIRA_TOKEN: ${JIRA_TOKEN:-}
  GITHUB_TOKEN: ${GITHUB_TOKEN:-}
  REPO_PATH: ${REPO_PATH:-}
  DAGSTER_BASE_URL: ${DAGSTER_BASE_URL:-http://localhost:3000}

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------

services:
  # PostgreSQL database for Dagster metadata
  dagster-db:
    image: postgres:15
    container_name: stary-dagster-db
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    ports:
      - "5432:5432"
    volumes:
      - dagster-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Dagster webserver (dagit UI)
  dagster:
    build:
      context: .
      dockerfile: dagster/dev/dagster/Dockerfile
    container_name: stary-dagster
    ports:
      - "3000:3000"
    environment:
      <<: [*proxy-env, *dagster-db-env]
    depends_on:
      dagster-db:
        condition: service_healthy
      user-deployment:
        condition: service_healthy

  # User deployment (stary code location served via gRPC)
  user-deployment:
    build:
      context: .
      dockerfile: dagster/dev/user_deployment/Dockerfile
    container_name: stary-user-deployment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    environment:
      <<: [*proxy-env, *dagster-db-env, *stary-config-env]
      DAGSTER_CURRENT_IMAGE: stary-user-deployment
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-h", "0.0.0.0", "-p", "4000"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Dagster daemon (runs sensors, schedules, run queue)
  dagster-daemon:
    build:
      context: .
      dockerfile: dagster/dev/dagster/Dockerfile
    container_name: stary-dagster-daemon
    entrypoint: ["dagster-daemon", "run"]
    restart: on-failure
    environment:
      <<: [*proxy-env, *dagster-db-env]
    depends_on:
      dagster-db:
        condition: service_healthy
      user-deployment:
        condition: service_healthy

volumes:
  dagster-db-data:
