apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector:8889"]
