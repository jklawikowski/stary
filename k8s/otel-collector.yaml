apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: stary
      app.kubernetes.io/name: stary
      component: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: stary
        app.kubernetes.io/name: stary
        component: otel-collector
    spec:
      securityContext: {}
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.98.0
        args: ["--config=/etc/otel/otel-collector-config.yaml"]
        ports:
        - containerPort: 4317
          name: otlp-grpc
          protocol: TCP
        - containerPort: 4318
          name: otlp-http
          protocol: TCP
        - containerPort: 8889
          name: prom-export
          protocol: TCP
        - containerPort: 13133
          name: health
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /etc/otel
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /
            port: 13133
            scheme: HTTP
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: otel-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: otel-collector
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP
  - name: prom-export
    port: 8889
    targetPort: 8889
    protocol: TCP
