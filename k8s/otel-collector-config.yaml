apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: otel-collector
data:
  otel-collector-config.yaml: |
    extensions:
      health_check:
        endpoint: "0.0.0.0:13133"

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1024

      resource:
        attributes:
          - key: deployment.environment
            value: production
            action: upsert

    connectors:
      spanmetrics:
        histogram:
          disable: true
        dimensions:
          - name: http.method
          - name: http.url
          - name: http.status_code
        dimensions_cache_size: 1000
        aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
        metrics_flush_interval: 15s

    exporters:
      otlp/tempo:
        endpoint: "tempo:4317"
        tls:
          insecure: true
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s

      debug:
        verbosity: basic

      prometheus:
        endpoint: "0.0.0.0:8889"
        resource_to_telemetry_conversion:
          enabled: true

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlp/tempo, spanmetrics, debug]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [batch]
          exporters: [prometheus]
