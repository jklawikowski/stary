apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: tempo
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: "0.0.0.0:4317"

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal

    compactor:
      compaction:
        block_retention: 48h
