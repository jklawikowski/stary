apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: stary
      app.kubernetes.io/name: stary
      component: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: stary
        app.kubernetes.io/name: stary
        component: grafana
    spec:
      securityContext: {}
      containers:
      - name: grafana
        image: grafana/grafana:10.4.2
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: GF_PATHS_PROVISIONING
          value: /etc/grafana/provisioning
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Viewer
        volumeMounts:
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
            scheme: HTTP
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1
      volumes:
      - name: datasources
        configMap:
          name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: qa-platform
  labels:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: stary
    app.kubernetes.io/name: stary
    component: grafana
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
