# Dagster instance configuration
# See: https://docs.dagster.io/deployment/dagster-instance

# Use PostgreSQL for run/event storage in production.
# For local dev, dagster will auto-use SQLite if these are commented out.

storage:
  postgres:
    postgres_db:
      username:
        env: DAGSTER_PG_USERNAME
      password:
        env: DAGSTER_PG_PASSWORD
      hostname:
        env: DAGSTER_PG_HOST
      db_name:
        env: DAGSTER_PG_DB
      port: 5432

run_launcher:
  module: dagster.core.launcher
  class: DefaultRunLauncher

run_coordinator:
  module: dagster.core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 5

telemetry:
  enabled: false
